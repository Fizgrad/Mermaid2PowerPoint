name: Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run pages:build
      - name: Detect Pages enablement token
        id: pages_token
        env:
          PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
        run: |
          if [ -n "$PAGES_ENABLEMENT_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Optionally enable GitHub Pages
        if: ${{ steps.pages_token.outputs.enabled == 'true' }}
        uses: actions/configure-pages@v5
        with:
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
          enablement: true
      - name: Pages setup note
        if: ${{ steps.pages_token.outputs.enabled != 'true' }}
        run: |
          echo "If this is the first Pages deployment, set Settings > Pages > Source to GitHub Actions."
          echo "To auto-enable Pages from CI, add a PAGES_ENABLEMENT_TOKEN secret with repo/pages admin permissions."
      - uses: actions/upload-pages-artifact@v4
        with:
          path: pages-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
